version: '3.8'

services:
  # ----------------------------------------------------
  # PostgreSQL (JSONB Data Store)
  # ----------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: documind-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: documind_user
      POSTGRES_PASSWORD: documind_password
      POSTGRES_DB: documind_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documind_user -d documind_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------
  # Redis (Cache & Rate Limiting)
  # ----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: documind-redis
    ports:
      - "6379:6379"

  # ----------------------------------------------------
  # Apache Kafka (Running in KRaft Mode - No Zookeeper)
  # ----------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: documind-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CLUSTER_ID: mkU__O2TQL2n_NqgD5K-bA

  # ----------------------------------------------------
  # MinIO (Enterprise Local S3 Mock)
  # ----------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: documind-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web Console Port
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data

  # ----------------------------------------------------
  # MinIO Bucket Auto-Provisioning
  # ----------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: documind-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set documind http://minio:9000 admin password123;
      mc mb documind/contracts-bucket;
      mc policy set public documind/contracts-bucket;
      exit 0;
      "

volumes:
  pgdata:
  minio_data:
