server:
  port: 8080

spring:
  application:
    name: documind-pipeline

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/documind_db
    username: documind_user
    password: documind_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: documind-workers
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# AWS S3 (Cloudflare R2 / MinIO)
aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:9000}
    access-key: ${AWS_ACCESS_KEY_ID:admin}
    secret-key: ${AWS_SECRET_ACCESS_KEY:password123}
    bucket-name: ${AWS_BUCKET_NAME:contracts-bucket}
    region: ${AWS_REGION:auto}

# Groq Config
groq:
  api:
    url: https://api.groq.com/openai/v1/chat/completions
    key: ${GROQ_API_KEY:your_default_key_here}
    model: llama3-8b-8192

# Logging
logging:
  level:
    com.documind.pipeline: DEBUG
    org.springframework.kafka: INFO
